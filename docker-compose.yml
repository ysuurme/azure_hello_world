services:
  backend:
    build: .
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Injected from kv-platformy-dev at launch by `task dev` (dev-up.ps1); never stored on disk.
      # Defaults to empty so `down`/`ps`/`logs` work without it; if you `up` without the
      # secret the backend fails fast at startup ("missing env vars: AZURE_CLIENT_SECRET").
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: .
    command: ["streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
