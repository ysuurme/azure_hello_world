name: Build and push container image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to GHCR
        required: false
        default: 'false'
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          # Build only the runtime stage — excludes build tools and keeps the image lean
          docker build --target runtime \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:latest \
            .

      - name: Push image
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true') || startsWith(github.ref, 'refs/tags/v')
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
          # On a version tag push, also tag the image with the git tag for pinnable releases
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          fi
