name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Install d2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --
      - name: Test
        run: uv run pytest -n auto --cov=src --cov-report=term-missing --cov-fail-under=80
