name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: arduino/setup-task@v2
      - name: Install dependencies
        run: task install
      - name: Lint
        run: task lint
      - name: Test
        run: task test
