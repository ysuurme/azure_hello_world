version: '3'

vars:
  ISSUE: '{{default "0" .ISSUE}}'
  RETRIES: '{{default "-1" .RETRIES}}' # -1 = read from .github/scripts/kanban/config.ps1

tasks:

  dev:
    desc: "Run backend+frontend locally; fetches the SP secret from kv-platformy-dev at launch (ARGS pass to compose, e.g. -- -d)"
    cmds:
      - pwsh -NoProfile -File .github/scripts/dev-up.ps1 {{.CLI_ARGS}}

  setup:
    desc: "Bootstrap — run once to configure GitHub Project field IDs, labels, and environment"
    cmds:
      - pwsh -NoProfile -File .github/scripts/setup.ps1
      - uv run python src/tools/setup.py

  sync:
    desc: "Sync ISSUES.md — push pending ISSUE blocks to GitHub Issues + Project board"
    cmds:
      - pwsh -NoProfile -File .github/scripts/sync-issues.ps1 {{.CLI_ARGS}}

  start:
    desc: "HITL — interactive Backlog picker; runs full orchestration in this terminal (ISSUE=N to skip picker)"
    cmds:
      - pwsh -NoProfile -File .github/scripts/kanban/start.ps1 -Issue {{.ISSUE}} -MaxRetries {{.RETRIES}}

  retry:
    desc: "Recovery — reset a stuck or failed issue back to agent:backlog (ISSUE=N required)"
    cmds:
      - pwsh -NoProfile -File .github/scripts/kanban/retry.ps1 -Issue {{.ISSUE}}

  runner:
    desc: "GHA runner — start in this terminal; OFFLINE=1 to soft-close (drains current job first)"
    vars:
      OFFLINE: '{{default "0" .OFFLINE}}'
    cmds:
      - pwsh -NoProfile -File .github/scripts/runner.ps1{{if eq .OFFLINE "1"}} -Offline{{end}}
