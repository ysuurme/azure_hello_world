# .gemini/policies/agent-dev.toml

# Base shell authorization (Required for the tool to function headlessly)
[[rule]]
description = "Authorize shell capability"
toolName = "run_shell_command"
decision = "allow"
priority = 100

[[rule]]
description = "Allow GitHub CLI"
toolName = "run_shell_command"
commandPrefix = "gh"
decision = "allow"
priority = 500

[[rule]]
description = "Allow Task runner"
toolName = "run_shell_command"
commandPrefix = "task"
decision = "allow"
priority = 500

[[rule]]
description = "Allow Ruff linting"
toolName = "run_shell_command"
commandPrefix = "ruff"
decision = "allow"
priority = 500

[[rule]]
description = "Allow Git operations"
toolName = "run_shell_command"
commandPrefix = "git"
decision = "allow"
priority = 500

# Hard deny for destructive commands
[[rule]]
toolName = "run_shell_command"
commandPrefix = "rm"
decision = "deny"
priority = 600

[[rule]]
toolName = "run_shell_command"
commandPrefix = "sudo"
decision = "deny"
priority = 600

[[rule]]
toolName = "run_shell_command"
commandPrefix = "format"
decision = "deny"
priority = 600

# File system access
[[rule]]
toolName = "read_file"
decision = "allow"
priority = 500

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 500

[[rule]]
toolName = "grep_search"
decision = "allow"
priority = 500

[[rule]]
toolName = "replace_file_content"
decision = "allow"
priority = 500

[[rule]]
toolName = "multi_replace_file_content"
decision = "allow"
priority = 500

[[rule]]
toolName = "list_dir"
decision = "allow"
priority = 500
